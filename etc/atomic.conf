# /etc/atomic.conf
#BTRFS_MOUNT="/run/atomic/temp_root"
#NEW_ROOT="/run/atomic/newroot"
#ESP="/efi"
#KEEP_GENERATIONS=3
#MAPPER_NAME="root_crypt"
#KERNEL_PKG="linux"
#KERNEL_PARAMS="rw slab_nomerge init_on_alloc=1 page_alloc.shuffle=1 pti=on vsyscall=none randomize_kstack_offset=on debugfs=off"

# Sign UKI files with sbctl for Secure Boot (requires sbctl)
#SBCTL_SIGN=1

# Upgrade guard: block direct pacman -Syu, suggest atomic-upgrade
# Controls both the pacman hook and the /usr/local/bin/pacman wrapper
# Set to 0 to disable (takes effect immediately, no restart needed)
#UPGRADE_GUARD=1

# Files to copy from current /home/<user>/ into env/ephemeral homes
# Space-separated list of relative paths from user home directory
# These are copied when creating new environments or ephemeral generations
# Can also be overridden per-command with --copy-files
#HOME_COPY_FILES=".bashrc .bash_profile .ssh .gnupg .gitconfig"
