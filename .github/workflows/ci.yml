name: CI
on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          shellcheck -s bash -e SC1090,SC1091,SC2010 \
            bin/atomic-upgrade \
            bin/atomic-gc \
            bin/atomic-rebuild-uki \
            lib/atomic/common.sh
          shellcheck -s bash -e SC1090,SC1091,SC2310 \
            bin/atomic-guard

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --no-cache-dir ruff mypy
      - run: ruff check lib/atomic/fstab.py lib/atomic/rootdev.py
      - run: mypy --ignore-missing-imports lib/atomic/fstab.py lib/atomic/rootdev.py

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install --no-cache-dir pytest
      - run: python -m pytest tests/ -v
